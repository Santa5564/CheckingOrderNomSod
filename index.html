<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Prompt', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #FFE4C4, #FFDAB9);
      overflow-x: hidden;
    }

    .glass-card {
      background: rgba(255,248,240,0.92);
      border: 1px solid rgba(255,255,255,0.35);
      backdrop-filter: blur(10px);
      border-radius: 22px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.12);
      position: relative;
      z-index: 2;
    }

    .btn-search {
      background: linear-gradient(135deg, #F4A460, #DEB887);
      border: none;
      border-radius: 14px;
      color: white;
      font-weight: 600;
      padding: 12px 24px;
      transition: all .25s ease;
    }

    .btn-search:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 18px rgba(244,164,96,0.35);
      color: white;
    }

    .order-card {
      border-radius: 22px;
      border: none;
      box-shadow: 0 12px 28px rgba(0,0,0,0.10);
      background: rgba(255,255,255,0.96);
      overflow: hidden;
      margin-bottom: 28px;
      animation: fadeUp .45s ease;
    }

    .order-header {
      background: linear-gradient(135deg, #F4A460, #DEB887);
      color: white;
      padding: 14px 20px;
      font-weight: 600;
      font-size: 1rem;
    }

    .order-title {
      color: #C17C3A;
      font-size: 1.1rem;
    }

    .custom-list .list-group-item {
      border: none;
      margin-bottom: 8px;
      border-radius: 12px;
      background: #fff8f2;
      padding: 12px 14px;
    }

    .slip-btn {
      border-radius: 12px;
      border: 1px solid #E8C9A8;
      background: #FFE4C4;
      color: #8B5E3C;
      font-weight: 600;
      padding: 10px 18px;
      transition: all 0.25s ease;
    }

    .slip-btn:hover {
      background: #FFD8A8;
      color: #6B4423;
      transform: translateY(-2px);
      box-shadow: 0 8px 18px rgba(255, 228, 196, 0.45);
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(14px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes floatMove {
      0% {
        transform: translate(0px, 0px) rotate(0deg);
      }
      20% {
        transform: translate(25px, -18px) rotate(2deg);
      }
      40% {
        transform: translate(40px, 10px) rotate(-2deg);
      }
      60% {
        transform: translate(20px, 25px) rotate(3deg);
      }
      80% {
        transform: translate(-10px, -15px) rotate(-3deg);
      }
      100% {
        transform: translate(0px, 0px) rotate(0deg);
      }
    }

    /* Character */
    .character-img {
      position: fixed;
      width: 220px;
      height: auto;
      z-index: 1;
      pointer-events: none;
      filter: drop-shadow(0 15px 30px rgba(0,0,0,0.18));
      will-change: transform;
    }

    .top-left { top: 30px; left: 6%; }
    .top-right { top: 20px; right: 8%; transform: scaleX(-1); }

    .middle-left { top: 52%; left: 7%; transform: translateY(-50%); }
    .middle-right { top: 48%; right: 9%; transform: translateY(-50%) scaleX(-1); }

    .bottom-left { bottom: 25px; left: 5%; }
    .bottom-right { bottom: 20px; right: 10%; transform: scaleX(-1); }

    @media (max-width: 992px) {
      .character-img { width: 140px; opacity: 0.7; }
    }

    @media (max-width: 768px) {
      .character-img { width: 90px; opacity: 0.55; }
    }

    @media (max-width: 576px) {
      .character-img { width: 65px; opacity: 0.45; }
    }
  </style>
</head>
<body>

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-8">

      <div class="card glass-card p-4 mb-4">
        <h2 class="text-center mb-4 fw-bold">ค้นหาคำสั่งซื้อ</h2>

        <div class="input-group">
          <input type="text" id="phone" class="form-control form-control-lg rounded-start-3" placeholder="กรอกเบอร์โทร">
          <button class="btn btn-search" onclick="searchOrder()">ค้นหา</button>
        </div>
      </div>

      <div id="result"></div>

    </div>
  </div>
</div>

<!-- Character Images -->
<img src="https://drive.google.com/thumbnail?id=1mIhZn1DnMjLll7kxaIcDmWUEkK-oltbM&sz=w1000" class="character-img top-left">
<img src="https://drive.google.com/thumbnail?id=1mIhZn1DnMjLll7kxaIcDmWUEkK-oltbM&sz=w1000" class="character-img middle-left">
<img src="https://drive.google.com/thumbnail?id=1mIhZn1DnMjLll7kxaIcDmWUEkK-oltbM&sz=w1000" class="character-img bottom-left">

<img src="https://drive.google.com/thumbnail?id=1mIhZn1DnMjLll7kxaIcDmWUEkK-oltbM&sz=w1000" class="character-img top-right">
<img src="https://drive.google.com/thumbnail?id=1mIhZn1DnMjLll7kxaIcDmWUEkK-oltbM&sz=w1000" class="character-img middle-right">
<img src="https://drive.google.com/thumbnail?id=1mIhZn1DnMjLll7kxaIcDmWUEkK-oltbM&sz=w1000" class="character-img bottom-right">


<script>

const characters = document.querySelectorAll(".character-img");

characters.forEach((el, index) => {
  let x = 0;
  let y = 0;
  let angle = 0;

  let vx = 0; // velocity
  let vy = 0;
  let vAngle = 0;

  function animate() {
    // drift ปกติ
    vx += (Math.random() - 0.5) * 0.3;
    vy += (Math.random() - 0.5) * 0.3;

    // friction (ค่อย ๆ หยุด)
    vx *= 0.92;
    vy *= 0.92;
    vAngle *= 0.9;

    x += vx;
    y += vy;
    angle += vAngle;

    // จำกัดขอบ
    x = Math.max(-60, Math.min(60, x));
    y = Math.max(-60, Math.min(60, y));

    // breathing
    const scale = 1 + Math.sin(Date.now() / 700 + index) * 0.05;

    el.style.transform = `
      translate(${x}px, ${y}px)
      rotate(${angle}deg)
      scale(${scale})
      ${el.classList.contains("top-right") || el.classList.contains("middle-right") || el.classList.contains("bottom-right") ? "scaleX(-1)" : ""}
    `;

    requestAnimationFrame(animate);
  }

  // 👉 คลิกแล้วสะดุ้ง
  el.addEventListener("click", (e) => {
    const rect = el.getBoundingClientRect();

    const centerX = rect.left + rect.width / 2;
    const centerY = rect.top + rect.height / 2;

    const dx = centerX - e.clientX;
    const dy = centerY - e.clientY;

    // normalize vector
    const dist = Math.sqrt(dx * dx + dy * dy) || 1;
    const force = 18; // 🔥 ปรับแรงตรงนี้

    vx += (dx / dist) * force;
    vy += (dy / dist) * force;

    // หมุนสะดุ้ง
    vAngle += (Math.random() - 0.5) * 20;

    // shake เพิ่ม
    for (let i = 0; i < 5; i++) {
      setTimeout(() => {
        vx += (Math.random() - 0.5) * 4;
        vy += (Math.random() - 0.5) * 4;
      }, i * 40);
    }
  });

  animate();
});

function searchOrder() {
  const phone = document.getElementById("phone").value;
  const resultDiv = document.getElementById("result");

  resultDiv.innerHTML = `
    <div class="text-center my-4">
      <div class="spinner-border text-warning"></div>
      <div class="mt-2 fw-semibold">กำลังค้นหาคำสั่งซื้อ...</div>
    </div>
  `;

  // 🔥 สร้าง callback name แบบ unique ทุกครั้ง (สำคัญมาก)
  const callbackName = "handleResponse_" + Date.now();

  window[callbackName] = function(data) {
    delete window[callbackName]; // ล้างทิ้ง (กัน memory leak)

    let html = "";

    if (!data || data.length === 0) {
      html = `
        <div class="alert alert-warning text-center rounded-4 shadow-sm">
          ไม่พบข้อมูลคำสั่งซื้อ
        </div>
      `;
    } else {
      data.forEach((order, index) => {
        let itemsHtml = "";

        order.items.forEach(item => {
          itemsHtml += `
            <li class="list-group-item d-flex justify-content-between">
              <span>${item.name}</span>
              <span class="fw-bold">${item.qty}</span>
            </li>`;
        });

        html += `
          <div class="card order-card">
            <div class="order-header">
              ออเดอร์ที่ ${index + 1}
            </div>
            <div class="card-body p-4">
              <h5 class="fw-bold order-title mb-3">เลขคำสั่งซื้อ: ${order.orderNo}</h5>
              <p><strong>${order.nameHeader}:</strong> ${order.nameValue}</p>
              <p><strong>${order.totalHeader}:</strong> ${order.totalValue} บาท</p>
              <p><strong>ที่อยู่:</strong><br>${order.address}</p>
              <p><strong>เลขพัสดุ:</strong><br>${order.trackingNo || '-'}</p>

              <h6 class="fw-bold mt-4 mb-3">รายการสินค้า</h6>
              <ul class="list-group custom-list mb-4">
                ${itemsHtml}
              </ul>

              ${order.slip ? `
                <a href="${order.slip}" target="_blank" class="btn slip-btn">
                  ดูหลักฐานการโอน
                </a>
              ` : ""}
            </div>
          </div>`;
      });
    }

    resultDiv.innerHTML = html;
  };

  // 🔥 ลบ script เก่า
  const oldScript = document.getElementById("jsonpScript");
  if (oldScript) oldScript.remove();

  // 🔥 สร้าง script ใหม่ (กัน cache + callback ชื่อใหม่)
  const script = document.createElement("script");
  script.id = "jsonpScript";
  script.src =
    "https://script.google.com/macros/s/AKfycbwi8LRQV-VPjfutKn-MyM3Hk7225rCb-maCFXQzyhChijL6YOYkpq4VpuqSTltchsqv/exec"
    + "?phone=" + encodeURIComponent(phone)
    + "&callback=" + callbackName
    + "&t=" + Date.now(); // กัน cache

  document.body.appendChild(script);
}

</script>

</body>
</html>
