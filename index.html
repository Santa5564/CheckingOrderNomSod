<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
  body {
    font-family: 'Prompt', sans-serif;
    min-height: 100vh;
    background: linear-gradient(135deg, #FFE4C4, #FFDAB9);
    overflow-x: hidden;
  }

  .glass-card {
    background: rgba(255,248,240,0.92);
    border: 1px solid rgba(255,255,255,0.35);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.12);
    position: relative;
    z-index: 2;
  }

  .btn-search {
    background: linear-gradient(135deg, #F4A460, #DEB887);
    border: none;
    border-radius: 12px;
    color: white;
    font-weight: 600;
    padding: 12px 24px;
  }

  .btn-search:hover {
    opacity: 0.92;
    color: white;
  }

  .custom-list .list-group-item {
    border: none;
    margin-bottom: 8px;
    border-radius: 12px;
    background: #fff8f2;
  }

  .order-card {
    border-radius: 18px;
    border: none;
    box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    background: rgba(255,255,255,0.95);
    position: relative;
    z-index: 2;
  }

  .order-title {
    color: #C17C3A;
  }

  .slip-btn {
    border-radius: 12px;
    border: 1px solid #DEB887;
    color: #A86A2B;
  }

  .slip-btn:hover {
    background: #F4A460;
    color: white;
    border-color: #F4A460;
  }

  /* Character Base */
  .character-img {
    position: fixed;
    width: 220px;
    height: auto;
    z-index: 1;
    pointer-events: none;
    filter: drop-shadow(0 10px 22px rgba(0,0,0,0.14));
  }

  /* Position */
  .top-left {
    top: 20px;
    left: 8%;
    animation: float1 4s ease-in-out infinite;
  }

  .middle-left {
    top: 50%;
    left: 8%;
    transform: translateY(-50%);
    animation: float2 5s ease-in-out infinite;
  }

  .bottom-left {
    bottom: 20px;
    left: 8%;
    animation: float3 4.5s ease-in-out infinite;
  }

  .top-right {
    top: 20px;
    right: 8%;
    transform: scaleX(-1);
    animation: float1r 4s ease-in-out infinite;
  }

  .middle-right {
    top: 50%;
    right: 8%;
    transform: translateY(-50%) scaleX(-1);
    animation: float2r 5s ease-in-out infinite;
  }

  .bottom-right {
    bottom: 20px;
    right: 8%;
    transform: scaleX(-1);
    animation: float3r 4.5s ease-in-out infinite;
  }

  /* Animations */
  @keyframes float1 {
    0%,100% { transform: translateY(0) scale(1); opacity: 0.85; }
    50% { transform: translateY(-10px) scale(1.03); opacity: 1; }
  }

  @keyframes float2 {
    0%,100% { transform: translateY(-50%) scale(1); opacity: 0.75; }
    50% { transform: translateY(calc(-50% - 12px)) scale(1.04); opacity: 0.95; }
  }

  @keyframes float3 {
    0%,100% { transform: translateY(0) scale(1); opacity: 0.8; }
    50% { transform: translateY(-8px) scale(1.02); opacity: 1; }
  }

  @keyframes float1r {
    0%,100% { transform: scaleX(-1) translateY(0) scale(1); opacity: 0.85; }
    50% { transform: scaleX(-1) translateY(-10px) scale(1.03); opacity: 1; }
  }

  @keyframes float2r {
    0%,100% { transform: translateY(-50%) scaleX(-1) scale(1); opacity: 0.75; }
    50% { transform: translateY(calc(-50% - 12px)) scaleX(-1) scale(1.04); opacity: 0.95; }
  }

  @keyframes float3r {
    0%,100% { transform: scaleX(-1) translateY(0) scale(1); opacity: 0.8; }
    50% { transform: scaleX(-1) translateY(-8px) scale(1.02); opacity: 1; }
  }

  /* Responsive */
  @media (max-width: 992px) {
    .character-img {
      width: 150px;
      opacity: 0.75;
    }
  }

  @media (max-width: 768px) {
    .character-img {
      width: 100px;
      opacity: 0.6;
    }
  }

  @media (max-width: 576px) {
    .character-img {
      width: 70px;
      opacity: 0.5;
    }
  }
</style>
</head>
<body>

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-8">

      <div class="card glass-card p-4 mb-4">
        <h2 class="text-center mb-4 fw-bold">ค้นหาคำสั่งซื้อ</h2>

        <div class="input-group">
          <input type="text" id="phone" class="form-control form-control-lg rounded-start-3" placeholder="กรอกเบอร์โทร">
          <button class="btn btn-search" onclick="searchOrder()">ค้นหา</button>
        </div>
      </div>

      <div id="result"></div>

    </div>
  </div>
</div>

<!-- Character Images -->
<img src="https://drive.google.com/thumbnail?id=1mIhZn1DnMjLll7kxaIcDmWUEkK-oltbM&sz=w1000" class="character-img top-left">
<img src="https://drive.google.com/thumbnail?id=1mIhZn1DnMjLll7kxaIcDmWUEkK-oltbM&sz=w1000" class="character-img middle-left">
<img src="https://drive.google.com/thumbnail?id=1mIhZn1DnMjLll7kxaIcDmWUEkK-oltbM&sz=w1000" class="character-img bottom-left">

<img src="https://drive.google.com/thumbnail?id=1mIhZn1DnMjLll7kxaIcDmWUEkK-oltbM&sz=w1000" class="character-img top-right">
<img src="https://drive.google.com/thumbnail?id=1mIhZn1DnMjLll7kxaIcDmWUEkK-oltbM&sz=w1000" class="character-img middle-right">
<img src="https://drive.google.com/thumbnail?id=1mIhZn1DnMjLll7kxaIcDmWUEkK-oltbM&sz=w1000" class="character-img bottom-right">

<script>
function searchOrder() {
  const phone = document.getElementById("phone").value;

  document.getElementById("result").innerHTML = `
    <div class="text-center my-4">
      <div class="spinner-border text-warning"></div>
      <div class="mt-2">กำลังค้นหา...</div>
    </div>
  `;

  window.handleResponse = function(data) {
    let html = "";

    if (!data || data.length === 0) {
      html = `
        <div class="alert alert-warning text-center rounded-4 shadow-sm">
          ไม่พบข้อมูลคำสั่งซื้อ
        </div>
      `;
    } else {
      data.forEach(order => {
        let itemsHtml = "";

        order.items.forEach(item => {
          itemsHtml += `
            <li class="list-group-item d-flex justify-content-between">
              <span>${item.name}</span>
              <span class="fw-bold">${item.qty}</span>
            </li>`;
        });

        html += `
          <div class="card order-card">
            <div class="card-body p-4">
              <h5 class="fw-bold order-title mb-3">เลขคำสั่งซื้อ: ${order.orderNo}</h5>
              <p><strong>${order.nameHeader}:</strong> ${order.nameValue}</p>
              <p><strong>${order.totalHeader}:</strong> ${order.totalValue} บาท</p>
              <p><strong>ที่อยู่:</strong><br>${order.address}</p>
              <p><strong>เลขพัสดุ:</strong><br>${order.trackingNo}</p>

              <h6 class="fw-bold mt-4 mb-3">รายการสินค้า</h6>
              <ul class="list-group mb-4">
                ${itemsHtml}
              </ul>

              ${order.slip ? `
                <a href="${order.slip}" target="_blank" class="btn btn-outline-secondary">
                  ดูหลักฐานการโอน
                </a>
              ` : ""}
            </div>
          </div>`;
      });
    }

    document.getElementById("result").innerHTML = html;
  };

  const oldScript = document.getElementById("jsonpScript");
  if (oldScript) oldScript.remove();

  const script = document.createElement("script");
  script.id = "jsonpScript";
  script.src = "https://script.google.com/macros/s/AKfycbyf-KMVbQKL3Ru7l9zczm7cuqKfpFYQQB9zzYCToRkBFvZ4VuCS0ChF9LmLkT8ZP09dlg/exec?phone=" + encodeURIComponent(phone) + "&callback=handleResponse";

  document.body.appendChild(script);
}
</script>


</body>
</html>
