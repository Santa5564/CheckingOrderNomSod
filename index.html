<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Prompt', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #FFE4C4, #FFDAB9);
      overflow-x: hidden;
    }

    .glass-card {
      background: rgba(255,248,240,0.92);
      border: 1px solid rgba(255,255,255,0.35);
      backdrop-filter: blur(10px);
      border-radius: 22px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.12);
      position: relative;
      z-index: 2;
    }

    .btn-search {
      background: linear-gradient(135deg, #F4A460, #DEB887);
      border: none;
      border-radius: 14px;
      color: white;
      font-weight: 600;
      padding: 12px 24px;
      transition: all .25s ease;
    }

    .btn-search:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 18px rgba(244,164,96,0.35);
      color: white;
    }

    .order-card {
      border-radius: 22px;
      border: none;
      box-shadow: 0 12px 28px rgba(0,0,0,0.10);
      background: rgba(255,255,255,0.96);
      overflow: hidden;
      margin-bottom: 28px;
      animation: fadeUp .45s ease;
    }

    .order-header {
      background: linear-gradient(135deg, #F4A460, #DEB887);
      color: white;
      padding: 14px 20px;
      font-weight: 600;
      font-size: 1rem;
    }

    .order-title {
      color: #C17C3A;
      font-size: 1.1rem;
    }

    .custom-list .list-group-item {
      border: none;
      margin-bottom: 8px;
      border-radius: 12px;
      background: #fff8f2;
      padding: 12px 14px;
    }

    .slip-btn {
      border-radius: 12px;
      border: 1px solid #E8C9A8;
      background: #FFE4C4;
      color: #8B5E3C;
      font-weight: 600;
      padding: 10px 18px;
      transition: all 0.25s ease;
    }

    .slip-btn:hover {
      background: #FFD8A8;
      color: #6B4423;
      transform: translateY(-2px);
      box-shadow: 0 8px 18px rgba(255, 228, 196, 0.45);
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(14px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Character */
    .character-img {
      position: fixed;
      width: 220px;
      height: auto;
      z-index: 1;
      pointer-events: none;
      filter: drop-shadow(0 10px 22px rgba(0,0,0,0.14));
    }

    .top-left { top: 20px; left: 8%; }
    .middle-left { top: 50%; left: 8%; transform: translateY(-50%); }
    .bottom-left { bottom: 20px; left: 8%; }

    .top-right { top: 20px; right: 8%; transform: scaleX(-1); }
    .middle-right { top: 50%; right: 8%; transform: translateY(-50%) scaleX(-1); }
    .bottom-right { bottom: 20px; right: 8%; transform: scaleX(-1); }

    @media (max-width: 992px) {
      .character-img { width: 140px; opacity: 0.7; }
    }

    @media (max-width: 768px) {
      .character-img { width: 90px; opacity: 0.55; }
    }

    @media (max-width: 576px) {
      .character-img { width: 65px; opacity: 0.45; }
    }
  </style>
</head>
<body>

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-8">

      <div class="card glass-card p-4 mb-4">
        <h2 class="text-center mb-4 fw-bold">ค้นหาคำสั่งซื้อ</h2>

        <div class="input-group">
          <input type="text" id="phone" class="form-control form-control-lg rounded-start-3" placeholder="กรอกเบอร์โทร">
          <button class="btn btn-search" onclick="searchOrder()">ค้นหา</button>
        </div>
      </div>

      <div id="result"></div>

    </div>
  </div>
</div>

<!-- Character Images -->
<img src="https://drive.google.com/thumbnail?id=1mIhZn1DnMjLll7kxaIcDmWUEkK-oltbM&sz=w1000" class="character-img top-left">
<img src="https://drive.google.com/thumbnail?id=1mIhZn1DnMjLll7kxaIcDmWUEkK-oltbM&sz=w1000" class="character-img middle-left">
<img src="https://drive.google.com/thumbnail?id=1mIhZn1DnMjLll7kxaIcDmWUEkK-oltbM&sz=w1000" class="character-img bottom-left">

<img src="https://drive.google.com/thumbnail?id=1mIhZn1DnMjLll7kxaIcDmWUEkK-oltbM&sz=w1000" class="character-img top-right">
<img src="https://drive.google.com/thumbnail?id=1mIhZn1DnMjLll7kxaIcDmWUEkK-oltbM&sz=w1000" class="character-img middle-right">
<img src="https://drive.google.com/thumbnail?id=1mIhZn1DnMjLll7kxaIcDmWUEkK-oltbM&sz=w1000" class="character-img bottom-right">


<script>
function searchOrder() {
  const phone = document.getElementById("phone").value;

  document.getElementById("result").innerHTML = `
    <div class="text-center my-4">
      <div class="spinner-border text-warning"></div>
      <div class="mt-2 fw-semibold">กำลังค้นหาคำสั่งซื้อ...</div>
    </div>
  `;

  window.handleResponse = function(data) {
    let html = "";

    if (!data || data.length === 0) {
      html = `
        <div class="alert alert-warning text-center rounded-4 shadow-sm">
          ไม่พบข้อมูลคำสั่งซื้อ
        </div>
      `;
    } else {
      data.forEach((order, index) => {
        let itemsHtml = "";

        order.items.forEach(item => {
          itemsHtml += `
            <li class="list-group-item d-flex justify-content-between">
              <span>${item.name}</span>
              <span class="fw-bold">${item.qty}</span>
            </li>`;
        });

        html += `
          <div class="card order-card">
            <div class="order-header">
              ออเดอร์ที่ ${index + 1}
            </div>
            <div class="card-body p-4">
              <h5 class="fw-bold order-title mb-3">เลขคำสั่งซื้อ: ${order.orderNo}</h5>
              <p><strong>${order.nameHeader}:</strong> ${order.nameValue}</p>
              <p><strong>${order.totalHeader}:</strong> ${order.totalValue} บาท</p>
              <p><strong>ที่อยู่:</strong><br>${order.address}</p>
              <p><strong>เลขพัสดุ:</strong><br>${order.trackingNo || '-'}</p>

              <h6 class="fw-bold mt-4 mb-3">รายการสินค้า</h6>
              <ul class="list-group custom-list mb-4">
                ${itemsHtml}
              </ul>

              ${order.slip ? `
                <a href="${order.slip}" target="_blank" class="btn slip-btn">
                  ดูหลักฐานการโอน
                </a>
              ` : ""}
            </div>
          </div>`;
      });
    }

    document.getElementById("result").innerHTML = html;
  };

  const oldScript = document.getElementById("jsonpScript");
  if (oldScript) oldScript.remove();

  const script = document.createElement("script");
  script.id = "jsonpScript";
  script.src = "https://script.google.com/macros/s/AKfycbzte6aVVOZfdh8F9174lf3WVuZRzKHhxSeY1jNa_uMWFhuT6xL_RU2G_22fh-erKKcoKQ/exec?phone=" + encodeURIComponent(phone) + "&callback=handleResponse&t=" + new Date().getTime();

  document.body.appendChild(script);
}
</script>

</body>
</html>
